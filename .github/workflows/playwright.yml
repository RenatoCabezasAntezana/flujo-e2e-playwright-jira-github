name: E2E Tests - SauceDemo

on:
  push:
    branches: [ main, master, 'feature/**', 'test/**' ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Crear carpeta de reportes
        run: mkdir -p reports

      - name: Run E2E Tests (intento 1)
        id: test_run_1
        run: npm run cucumber
        continue-on-error: true

      - name: Healing - Intento 2
        id: test_run_2
        if: steps.test_run_1.outcome == 'failure'
        run: npm run cucumber
        continue-on-error: true

      - name: Healing - Intento 3
        id: test_run_3
        if: steps.test_run_2.outcome == 'failure'
        run: npm run cucumber
        continue-on-error: true

      - name: Evaluar resultado final
        id: final_result
        run: |
          if [ "${{ steps.test_run_1.outcome }}" == "success" ] || \
             [ "${{ steps.test_run_2.outcome }}" == "success" ] || \
             [ "${{ steps.test_run_3.outcome }}" == "success" ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Crear Bug en Jira si todos los intentos fallaron
        if: steps.final_result.outputs.status == 'failed'
        id: create_bug
        env:
          ATLASSIAN_BASE_URL: ${{ secrets.ATLASSIAN_BASE_URL }}
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
        run: |
          BUG_KEY=$(curl -s -X POST "$ATLASSIAN_BASE_URL/rest/api/3/issue" \
            -u "$ATLASSIAN_EMAIL:$ATLASSIAN_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "fields": {
                "project": { "key": "SB" },
                "summary": "[BUG] Fallo en tests E2E Login SauceDemo - SB-73",
                "description": {
                  "type": "doc",
                  "version": 1,
                  "content": [{
                    "type": "paragraph",
                    "content": [{
                      "type": "text",
                      "text": "Los tests E2E del ticket SB-73 fallaron después de 3 intentos en el pipeline de GitHub Actions. Branch: ${{ github.ref_name }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }]
                  }]
                },
                "issuetype": { "name": "Bug" },
                "priority": { "name": "High" }
              }
            }' | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])")

          echo "bug_key=$BUG_KEY" >> $GITHUB_OUTPUT
          echo "Bug creado: $BUG_KEY"

          curl -s -X POST "$ATLASSIAN_BASE_URL/rest/api/3/issueLink" \
            -u "$ATLASSIAN_EMAIL:$ATLASSIAN_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": { \"name\": \"Blocks\" },
              \"inwardIssue\": { \"key\": \"$BUG_KEY\" },
              \"outwardIssue\": { \"key\": \"SB-73\" }
            }"

          echo "Vinculo creado: $BUG_KEY -> SB-73"

      - name: Publicar reporte en Surge.sh
        if: always()
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npx surge ./reports ${{ secrets.SURGE_DOMAIN }} --token $SURGE_TOKEN

      - name: Notificar resultado a Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ steps.final_result.outputs.status }}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPORT_URL="https://${{ secrets.SURGE_DOMAIN }}/cucumber-report.html"

          if [ "$STATUS" == "passed" ]; then
            RESULTADO="✅ Todos los tests pasaron"
            EMOJI="✅"
          else
            RESULTADO="❌ Los tests fallaron después de 3 intentos"
            EMOJI="❌"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"status\": \"$EMOJI $STATUS\",
              \"branch\": \"$BRANCH\",
              \"resultado\": \"$RESULTADO\",
              \"run_url\": \"$REPORT_URL\"
            }"

      - name: Publicar reporte Cucumber como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Fallar el pipeline si los tests no pasaron
        if: steps.final_result.outputs.status == 'failed'
        run: exit 1
